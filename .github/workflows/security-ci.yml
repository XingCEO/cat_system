name: Security and Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-tests:
    name: Backend tests and security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio pip-audit bandit

      - name: Run backend tests
        working-directory: backend
        run: pytest tests/ --maxfail=1 --disable-warnings -q

      - name: Run pip-audit
        env:
          PYTHONUTF8: "1"
        run: pip-audit -r backend/requirements.txt --progress-spinner off

      - name: Run bandit
        run: bandit -r backend -lll

  frontend-build:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck and build
        working-directory: frontend
        run: npm run build

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
